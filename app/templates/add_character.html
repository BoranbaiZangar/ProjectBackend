{% extends 'base.html' %}
{% block content %}
<h2>Добавить персонажа</h2>
<form method="POST">
    <input type="text" name="name" class="form-control" placeholder="Имя" required><br>
    <input type="number" name="age" class="form-control" placeholder="Возраст"><br>
    <input type="text" name="gender" class="form-control" placeholder="Пол"><br>
    <textarea name="appearance" class="form-control" placeholder="Внешность"></textarea><br>
    <textarea name="personality" class="form-control" placeholder="Характер"></textarea><br>
    <textarea name="backstory" class="form-control" placeholder="История"></textarea><br>
    <button type="submit" class="btn btn-success">Сохранить</button>
</form>
<a href="{{ url_for('character.list_characters', project_id=project_id) }}" class="btn btn-secondary mt-3">Назад</a>
{% endblock %}
