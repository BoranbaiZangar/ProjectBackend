{% extends 'base.html' %}
{% block content %}
<h2>Ваши вселенные</h2>

<form method="POST" action="{{ url_for('projects.create_project') }}">
    <input type="text" name="title" class="form-control" placeholder="Название проекта" required>
    <button type="submit" class="btn btn-primary mt-2">Создать Вселенную</button>
</form>

<hr>

{% for project in projects %}
<div class="card my-2">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h5 class="card-title">{{ project.title }}</h5>
        </div>
        <div>
            <a href="{{ url_for('character.list_characters', project_id=project.id) }}" class="btn btn-sm btn-info">Персонажи</a>
            <a href="{{ url_for('projects.delete_project', id=project.id) }}" class="btn btn-sm btn-danger">Удалить</a>
        </div>
    </div>
</div>
{% else %}
<p>Вселенных пока нет.</p>
{% endfor %}
{% endblock %}
