{% extends 'base.html' %}
{% block content %}
<h2>Редактировать персонажа: {{ character.name }}</h2>
<form method="POST">
    <input type="text" name="name" class="form-control" value="{{ character.name }}" required><br>
    <input type="number" name="age" class="form-control" value="{{ character.age }}"><br>
    <input type="text" name="gender" class="form-control" value="{{ character.gender }}"><br>
    <textarea name="appearance" class="form-control">{{ character.appearance }}</textarea><br>
    <textarea name="personality" class="form-control">{{ character.personality }}</textarea><br>
    <textarea name="backstory" class="form-control">{{ character.backstory }}</textarea><br>
    <button type="submit" class="btn btn-primary">Обновить</button>
</form>
<a href="{{ url_for('character.list_characters', project_id=character.project_id) }}" class="btn btn-secondary mt-3">Назад</a>
{% endblock %}
